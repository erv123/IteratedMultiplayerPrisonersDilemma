<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Game</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { font-family: Arial; }

    .topbar { display:flex; gap:12px; align-items:center; margin-bottom:16px; }
    .container { display:flex; gap:20px; }
    .players { flex: 1 1 60%; }
    .leaderboard { flex: 0 0 30%; border-left:1px solid #ccc; padding-left:16px; }
    .player-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .player-name { width:140px; }
    button:disabled, .choice-btn:disabled { background:#ddd; color:#666; cursor:not-allowed; opacity:0.9; }
    .selected-peace { background: #2e8b57; color: #fff; }
    .selected-war { background: #b22222; color: #fff; }
    .cell-war-war { background: #b22222; color: #fff; }
    .cell-peace-peace { background: #2e8b57; color: #fff; }
    .cell-war-peace { background: #800080; color: #fff; }
    .cell-peace-war { background: #000; color: #fff; }
  </style>
</head>
<body>

  <div class="page">
    <header class="topbar card" style="justify-content:space-between">
      <div style="display:flex;gap:12px;align-items:center">
        <div class="brand">Game: <strong><span id="gameId"></span></strong></div>
        <div class="muted">Turn: <span id="turnDisplay"></span></div>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <div class="muted">User: <span id="username">(guest)</span></div>
        <a href="/rules.html" class="secondary">Rules</a>
        <button id="backToInfoBtn" class="secondary">Back to Info</button>
        <button id="logoutBtn" class="secondary">Logout</button>
      </div>
    </header>

    <div class="container" style="margin-top:14px">
      <div class="players card">
        <h3 id="actionHeader">Choose Your Actions</h3>
        <div id="playerList"></div>
        <div style="margin-top:12px">
          <button id="endTurnBtn">End Turn</button>
        </div>
      </div>

      <aside class="leaderboard card">
        <h3>Leaderboard</h3>
        <div id="leaderboard">(loading...)</div>
      </aside>
    </div>

    <section style="margin-top:14px">
      <h3>Turn History</h3>
      <div id="historyContainer" class="card"></div>
    </section>
  </div>

  <script src="/api.js"></script>
  <script src="/polling.js"></script>
  <script src="/game.js"></script>
</body>
</html>
