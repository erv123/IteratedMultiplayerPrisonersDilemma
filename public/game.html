<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Game</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/table-styles.css">
    <style>
    body { font-family: Arial; }

    .topbar { display:flex; gap:12px; align-items:center; margin-bottom:16px; }
    .container { display:flex; gap:20px; }
    .players { flex: 1 1 60%; }
    .leaderboard { flex: 0 0 30%; border-left:1px solid var(--muted-border); padding-left:16px; }
    /* legacy .player-row removed — player list now uses TableRenderer */
    .player-name { width:140px; }
    button:disabled, .choice-btn:disabled { background:var(--disabled-bg); color:var(--disabled-color); cursor:not-allowed; opacity:0.9; }
  </style>
</head>
<body>

  <div class="page">
    <header class="topbar card" style="justify-content:space-between">
      <div style="display:flex;gap:12px;align-items:center">
        <div class="brand">Game: <strong><span id="gameId"></span></strong></div>
        <div class="strong">Turn: <span id="turnDisplay"></span></div>
        <div style="margin-left:12px">
          <label for="orderToggle" class="muted">Order:</label>
          <select id="orderToggle" aria-label="Order players and history">
            <option value="score">By Score</option>
            <option value="alpha">Alphabetical</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <div style="display:flex;align-items:center;gap:8px;margin-right:8px">
          <label for="themeToggle" class="muted" style="font-size:0.95rem;margin-right:6px">Theme</label>
          <label class="toggle-switch">
            <input id="themeToggle" type="checkbox" aria-label="Toggle dark mode" />
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="muted">User: <span id="username">(guest)</span></div>
        <button onclick="window.location.href='/rules.html'" class="secondary">Rules</button>
        <button onclick="window.location.href='/'" class="secondary">Lobby</button>
        <button id="backToInfoBtn" class="secondary">Back to Info</button>
      </div>
    </header>

    <div class="container" style="margin-top:14px">
      <div class="players card">
        <h3 id="actionHeader">Choose Your Actions</h3>
        <div id="playerList"></div>
        <div style="margin-top:12px">
          <button id="endTurnBtn">End Turn</button>
        </div>
      </div>

      <aside class="leaderboard card">
        <h3>Leaderboard</h3>
        <div id="leaderboard">(loading...)</div>
      </aside>
    </div>

    <section style="margin-top:14px">
      <h3>Turn History</h3>
      <div id="historyContainer" class="card"></div>
    </section>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/polling.js"></script>
  <script src="/js/tableRenderer.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/alertService.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
