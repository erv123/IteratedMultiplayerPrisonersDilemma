<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Rules</title>
  <link rel="stylesheet" href="/styles.css">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
</head>
<body>
  <div class="page">
    <header class="topbar card" style="justify-content:space-between">
      <div>
        <h1 style="margin:0">Game Rules</h1>
        <div class="muted">Iterated Prisoners Dilemma — Quick reference</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="backRulesBtn" class="secondary">Back</button>
        <div style="display:flex;align-items:center;gap:8px;margin-left:8px">
          <label for="themeToggle" class="muted" style="font-size:0.95rem;margin-right:6px">Theme</label>
          <label class="toggle-switch">
            <input id="themeToggle" type="checkbox" aria-label="Toggle dark mode" />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </header>

    <main style="margin-top:14px">
      <div class="card" id="rulesContainer" aria-labelledby="rulesHeading">
        <!-- Rules content loaded dynamically from /content/gameinfo.html (rules-fragment) -->
      </div>
    </main>

  </div>

  <script src="/js/theme.js"></script>
  <script src="/js/contentLoader.js"></script>
  <script>
    function goBack(){
      try {
        const current = document.documentElement.getAttribute('data-theme') || sessionStorage.getItem('theme') || 'auto';
        try { sessionStorage.setItem('theme', current); } catch(e) {}
      } catch (e) {}
      if (window.history && window.history.length>1) return window.history.back();
      window.location.href='/';
    }
    const backA = document.getElementById('backRulesBtn');
    if (backA) backA.addEventListener('click', goBack);
    const backB = document.getElementById('backRulesBtn2');
    if (backB) backB.addEventListener('click', goBack);

    if (window.ContentLoader) {
      window.ContentLoader.loadContentFragment('rules-fragment', 'rulesContainer');
    } else {
      // fallback: try to load after a short delay if script loads after this block
      setTimeout(() => { if (window.ContentLoader) window.ContentLoader.loadContentFragment('rules-fragment', 'rulesContainer'); }, 200);
    }
  </script>
</body>
</html>
