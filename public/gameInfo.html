<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Game Info</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/table-styles.css">
</head>
<body>
  <div class="page">
    <header class="topbar card" style="justify-content:space-between">
      <div>
        <h1 style="margin:0">Game Info</h1>
        <div>
          <span class="muted">Game:</span> <strong><span id="gameNameDisplay"></span></strong>
        </div>
        <div style="font-size:0.9rem">
          <span class="muted">ID:</span> <span id="gameIdDisplay"></span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
          <div style="display:flex;gap:8px;align-items:center">
          <div style="display:flex;align-items:center;gap:8px;margin-right:8px">
            <label for="themeToggle" class="muted" style="font-size:0.95rem;margin-right:6px">Theme</label>
            <label class="toggle-switch">
              <input id="themeToggle" type="checkbox" aria-label="Toggle dark mode" />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div>User: <span id="loggedUserDisplay">(not logged in)</span></div>
          <button onclick="window.location.href='/rules.html'" class="secondary">Rules</button>
          <button id="backLobbyBtn" class="secondary">Lobby</button>
        </div>
        <div id="status"></div>
      </div>
    </header>

    <div class="container" style="margin-top:6px">
      <div class="players" style="min-width:320px">
        <div class="card players-card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <h3 style="margin:0">Players</h3>
            </div>
            <div>
              <button id="downloadGameBtn" style="display:none;margin-left:6px">Download Game</button>
              <button id="downloadZipBtn" style="display:none;margin-left:6px">Download ZIP</button>
            </div>
          </div>
          <div id="playersList" style="margin-top:8px">(loading...)</div>
        </div>

        <div class="card score-card">
          <h3 style="margin-top:0">Score History</h3>
          <canvas id="scoreChart" width="800" height="300" style="border:1px solid #ccc"></canvas>
        </div>
      </div>

      <aside class="leaderboard" style="width:320px;min-width:220px">
        <div class="card auth-card">
          <div id="loginNotice">Please log in from the lobby to join this game.</div>
          <div id="loggedInActions" style="display:none;margin-top:10px">
            <button id="enterGameBtn">Join / Enter Game</button>
            <button id="logoutBtn" class="secondary">Logout</button>
          </div>
        </div>
        <div class="card leaderboard-card" style="margin-top:12px">
          <h4 style="margin:0 0 8px">Leaderboard</h4>
          <div id="leaderboardDisplay">(loading...)</div>
        </div>
      </aside>

      <div class="settings-wrap" style="width:320px;min-width:220px">
        <div class="card settings-card">
          <h4 style="margin:0 0 8px">Game Settings</h4>
          <div id="gameSettings">(loading...)</div>
        </div>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/polling.js"></script>
    <script src="/js/tableRenderer.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/alertService.js"></script>
    <script src="/js/gameInfo.js"></script>
  </div>
</body>
</html>
