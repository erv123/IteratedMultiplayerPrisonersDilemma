<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Game Info</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="page">
    <header class="topbar card" style="justify-content:space-between">
      <div>
        <h1 style="margin:0">Game Info</h1>
        <div class="muted">Game: <strong><span id="gameNameDisplay"></span></strong></div>
        <div class="muted" style="font-size:0.9rem">ID: <span id="gameIdDisplay"></span></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
          <div style="display:flex;gap:8px;align-items:center">
          <div>User: <span id="loggedUserDisplay">(not logged in)</span></div>
          <button onclick="window.location.href='/rules.html'" class="secondary">Rules</button>
        </div>
        <div id="status" class="muted"></div>
      </div>
    </header>

    <div class="container" style="margin-top:6px">
      <div class="players" style="min-width:320px">
        <div class="card players-card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <h3 style="margin:0">Players</h3>
            </div>
            <div>
              <button id="downloadGameBtn" style="display:none;margin-left:6px">Download Game</button>
              <button id="downloadZipBtn" style="display:none;margin-left:6px">Download ZIP</button>
            </div>
          </div>
          <div id="playersList" style="margin-top:8px">(loading...)</div>
        </div>

        <div class="card score-card">
          <h3 style="margin-top:0">Score History</h3>
          <canvas id="scoreChart" width="800" height="300" style="border:1px solid #ccc"></canvas>
        </div>
      </div>

      <aside class="leaderboard" style="width:320px;min-width:220px">
        <div class="card auth-card">
          <div id="loginNotice">Please log in from the lobby to join this game.</div>
          <div id="loggedInActions" style="display:none;margin-top:10px">
            <button id="enterGameBtn">Join / Enter Game</button>
            <button id="logoutBtn" class="secondary">Logout</button>
          </div>
        </div>
      </aside>

      <div class="settings-wrap" style="width:320px;min-width:220px">
        <div class="card settings-card">
          <h4 style="margin:0 0 8px">Game Settings</h4>
          <div id="gameSettings">(loading...)</div>
        </div>
      </div>
    </div>

    <script src="/api.js"></script>
    <script src="/polling.js"></script>
    <script src="/gameInfo.js"></script>
  </div>
</body>
</html>
